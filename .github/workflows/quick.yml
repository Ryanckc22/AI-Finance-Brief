name: A股高位整理扫描（方法B极速版）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'   # 北京时间17:00收盘后运行

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas numpy

      - name: Run high-level scan
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'
          import akshare as ak
          import pandas as pd
          import numpy as np
          import datetime, os, smtplib
          from email.mime.text import MIMEText

          print("获取全市场A股K线数据...")
          # 获取全A股列表
          stock_list = ak.stock_info_a_code_name()

          # 过滤ST股票
          stock_list = stock_list[~stock_list['name'].str.contains("ST|st")]

          print("股票数量(去ST):", len(stock_list))

          results = []

          # 批量获取最近15日日K线并判断
          for idx, row in stock_list.iterrows():
              code = row['code']
              name = row['name']

              try:
                  # 最近15日日线
                  df = ak.stock_zh_a_hist(symbol=code, period="daily", adjust="")
                  if len(df) < 60:  # 过滤次新股
                      continue

                  # 保留最近15天
                  df = df.tail(15).reset_index(drop=True)
                  closes = df['收盘'].values
                  opens = df['开盘'].values

                  # 计算涨幅
                  pct = (closes[1:] - closes[:-1]) / closes[:-1] * 100

                  # 找最近10日内第一个涨停(>=9.8%)
                  first_limit_idx = None
                  n = len(pct)
                  search_start = max(0, n-10)
                  for i in range(search_start, n):
                      if pct[i] >= 9.8:
                          first_limit_idx = i + 1  # pct对应的是 closes[1:]，所以+1得到涨停日索引
                          break

                  if first_limit_idx is None:
                      continue

                  base_open = opens[first_limit_idx]

                  # 涨停后连续收盘是否都 >= base_open
                  if np.all(closes[first_limit_idx+1:] >= base_open):
                      results.append({
                          'code': code,
                          'name': name,
                          'close': closes[-1],
                          'base_open': base_open,
                          'limit_date': df.loc[first_limit_idx,'日期'],
                          'days_since': len(closes) - 1 - first_limit_idx
                      })

              except Exception as e:
                  # 出错跳过
                  continue

          print("符合条件股票数量:", len(results))

          # 格式化邮件内容
          now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
          text = f"A股高位整理扫描 {now}\n\n"
          if not results:
              text += "今日暂无符合条件的股票"
          else:
              text += "代码 名称 最新收盘 基准开盘 涨停日 距今\n"
              for r in results:
                  text += f"{r['code']} {r['name']} {r['close']:.2f} {r['base_open']:.2f} {r['limit_date']} {r['days_since']}天前\n"

          print(text)

          # 发邮件
          sender = os.environ['EMAIL_USER']
          password = os.environ['EMAIL_PASS']

          msg = MIMEText(text, 'plain', 'utf-8')
          msg['Subject'] = f"A股高位整理扫描 {now}"
          msg['From'] = sender
          msg['To'] = sender

          server = smtplib.SMTP_SSL("smtp.qq.com", 465)
          server.login(sender, password)
          server.sendmail(sender, sender, msg.as_string())
          server.quit()

          print("邮件发送成功")
          PYEOF
