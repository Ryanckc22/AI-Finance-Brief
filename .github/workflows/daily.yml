          # ===== 5. 财经新闻（Google News RSS）=====
          def fetch_news():
              from email.utils import parsedate_to_datetime
              queries = [
                  ("A股/中国市场", "https://news.google.com/rss/search?q=A股+股市&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("科技/AI",      "https://news.google.com/rss/search?q=人工智能+科技股&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("宏观经济",     "https://news.google.com/rss/search?q=美联储+经济+利率&hl=en-US&gl=US&ceid=US:en"),
              ]
              all_news = []
              for category, url in queries:
                  try:
                      r = requests.get(url, timeout=8, headers={"User-Agent":"Mozilla/5.0"})
                      # 同时提取标题和发布时间
                      items = re.findall(
                          r"<item>.*?<title><!\[CDATA\[(.+?)\]\]></title>.*?<pubDate>(.+?)</pubDate>.*?</item>",
                          r.text, re.DOTALL)
                      if not items:
                          # 备用：无CDATA格式
                          titles = re.findall(r"<title>(.+?)</title>", r.text)[1:5]
                          dates  = re.findall(r"<pubDate>(.+?)</pubDate>", r.text)[:4]
                          items  = list(zip(titles, dates + [""] * 4))
                      headlines = []
                      for title, pub in items[:4]:
                          title = title.strip()
                          if not title or "Google" in title:
                              continue
                          # 解析时间，转换为北京时间
                          try:
                              dt = parsedate_to_datetime(pub.strip())
                              # 转北京时间 UTC+8
                              import datetime as _dt
                              bj = dt.utctimetuple()
                              bj_hour = (dt.hour + 8) % 24
                              time_str = f"{dt.month:02d}/{dt.day:02d} {bj_hour:02d}:{dt.minute:02d}"
                          except:
                              time_str = ""
                          tag = f"[{time_str}] " if time_str else ""
                          headlines.append(f"  • {tag}{title}")
                      if headlines:
                          all_news.append(f"【{category}】")
                          all_news.extend(headlines)
                  except Exception as e:
                      all_news.append(f"【{category}】获取失败: {e}")
              log("新闻", f"获取{len([n for n in all_news if '•' in n])}条")
              return all_news if all_news else ["新闻获取失败"]

          # ===== 6. 宏观日历 =====
          def macro_calendar():
              now = datetime.datetime.utcnow()
              # 重要宏观事件硬编码（2026年）
              events = [
