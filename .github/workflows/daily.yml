name: AI Finance Daily

on:
  schedule:
    - cron: '30 0,4,14 * * *'   # 北京时间 08:30 / 12:30 / 22:30
  workflow_dispatch:

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests yfinance
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'
          import requests, datetime, smtplib, json, re, os, time
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import yfinance as yf

          def log(tag, msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {tag}: {msg}")

          # ===== 1. 北向资金（境外无法访问，跳过）=====
          def northbound_funds():
              log("北向资金", "境外服务器无法访问国内接口，跳过")
              return ["北向资金：服务器在境外，无法访问国内接口"]

          # ===== 2. 美股科技股 =====
          def us_tech_stocks():
              symbols = {
                  "NVDA":"英伟达","MSFT":"微软","TSLA":"特斯拉",
                  "AAPL":"苹果","META":"Meta","GOOGL":"谷歌",
                  "AMZN":"亚马逊","AMD":"超微半导体"
              }
              result = []
              for i,(s,name) in enumerate(symbols.items(),1):
                  try:
                      hist = yf.Ticker(s).history(period="5d").dropna(subset=["Close"])
                      if len(hist) < 2:
                          result.append(f"{i}. {name}({s}): 无数据")
                          continue
                      prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                      d = hist.index[-1].strftime("%m-%d")
                      chg = last - prev
                      result.append(f"{i}. {name}({s})[{d}]: ${last:.2f} {chg:+.2f}({chg/prev*100:+.2f}%)")
                  except Exception as e:
                      result.append(f"{i}. {name}({s}) 失败: {e}")
              log("美股", f"获取{len([r for r in result if '失败' not in r])}条")
              return result

          # ===== 3. A股板块ETF（按涨跌幅排序）=====
          def sector_etf():
              etfs = [
                  ("芯片/半导体",   "512480.SS"),
                  ("人工智能(AI)",  "515070.SS"),
                  ("机器人",        "562500.SS"),
                  ("计算机",        "512720.SS"),
                  ("5G/通信",       "515050.SS"),
                  ("卫星/航天",     "516160.SS"),
                  ("有色金属",      "512400.SS"),
                  ("油气/石油",     "159697.SZ"),
                  ("化工",          "516020.SS"),
                  ("钢铁",          "515210.SS"),
                  ("煤炭",          "515220.SS"),
                  ("稀土/稀有金属","516780.SS"),
                  ("电网设备",      "159611.SZ"),
                  ("工程机械",      "516950.SS"),
                  ("国防军工",      "512660.SS"),
                  ("光伏",          "515790.SS"),
                  ("新能源车",      "515030.SS"),
                  ("证券",          "512880.SS"),
                  ("银行",          "512800.SS"),
                  ("红利",          "510880.SS"),
                  ("央国企",        "510720.SS"),
                  ("沪深300",       "510300.SS"),
                  ("中证500",       "510500.SS"),
                  ("中证1000",      "512100.SS"),
                  ("科创50",        "588000.SS"),
                  ("创业板50",      "159949.SZ"),
                  ("新能源(宽基)",  "159915.SZ"),
                  ("医药生物",      "159929.SZ"),
                  ("消费",          "159928.SZ"),
                  ("金融",          "510230.SS"),
              ]
              rows = []
              for sector, code in etfs:
                  try:
                      hist = yf.Ticker(code).history(period="5d").dropna(subset=["Close"])
                      if len(hist) < 2:
                          rows.append((sector, code, None, None, None))
                          continue
                      prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                      d = hist.index[-1].strftime("%m-%d")
                      pct = (last - prev) / prev * 100
                      rows.append((sector, code, last, pct, d))
                  except:
                      rows.append((sector, code, None, None, None))
              rows.sort(key=lambda x: x[3] if x[3] is not None else -999, reverse=True)
              result = []
              for i,(sector,code,last,pct,d) in enumerate(rows,1):
                  if last is None:
                      result.append(f"{i:2}. {sector}({code}): 暂无数据")
                  else:
                      arrow = "▲" if pct > 0 else ("▼" if pct < 0 else "—")
                      result.append(f"{i:2}. {sector}({code})[{d}]: {last:.3f}  {arrow}{abs(pct):.2f}%")
              log("板块ETF", f"获取{len([r for r in rows if r[2] is not None])}条")
              return result, rows  # 返回rows供强势股使用

          # ===== 4. 强势股筛选（各强势板块前10大重仓股）=====
          def strong_stocks(etf_rows):
              # 取涨幅前5板块对应的代表性龙头股（人工整理，覆盖主要板块）
              top_sectors_stocks = {
                  "512480.SS": [  # 半导体
                      ("中芯国际","688981.SS"),("北方华创","002371.SZ"),("韦尔股份","603501.SS"),
                      ("澜起科技","688008.SS"),("寒武纪","688256.SS")],
                  "515070.SS": [  # AI
                      ("科大讯飞","002230.SZ"),("寒武纪","688256.SS"),("商汤-W","0020.HK"),
                      ("海光信息","688041.SS"),("中科曙光","603019.SS")],
                  "562500.SS": [  # 机器人
                      ("埃斯顿","002747.SZ"),("汇川技术","300124.SZ"),("绿的谐波","688017.SS"),
                      ("三花智控","002050.SZ"),("鸣志电器","603728.SS")],
                  "515050.SS": [  # 5G
                      ("中兴通讯","000063.SZ"),("烽火通信","600498.SS"),("中际旭创","300308.SZ"),
                      ("新易盛","300502.SZ"),("天孚通信","300394.SZ")],
                  "516160.SS": [  # 卫星航天
                      ("中国卫通","601698.SS"),("航天宏图","688066.SS"),("华力创通","300045.SZ"),
                      ("中国卫星","600118.SS"),("臻镭科技","688270.SS")],
                  "515790.SS": [  # 光伏
                      ("隆基绿能","601012.SS"),("通威股份","600438.SS"),("晶澳科技","002459.SZ"),
                      ("阳光电源","300274.SZ"),("福斯特","603806.SS")],
                  "515030.SS": [  # 新能源车
                      ("比亚迪","002594.SZ"),("宁德时代","300750.SZ"),("亿纬锂能","300014.SZ"),
                      ("汽车ETF","588230.SS"),("欣旺达","300207.SZ")],
                  "512660.SS": [  # 军工
                      ("中航沈飞","600760.SS"),("航发动力","600893.SS"),("中直股份","600038.SS"),
                      ("中航西飞","000768.SZ"),("紫光国微","002049.SZ")],
                  "512880.SS": [  # 证券
                      ("东方财富","300059.SZ"),("中信证券","600030.SS"),("华泰证券","601688.SS"),
                      ("国泰君安","601211.SS"),("广发证券","000776.SZ")],
                  "512400.SS": [  # 有色
                      ("紫金矿业","601899.SS"),("洛阳钼业","603993.SS"),("中国铝业","601600.SS"),
                      ("天齐锂业","002466.SZ"),("赣锋锂业","002460.SZ")],
              }

              # 找出涨幅前5的板块代码
              valid = [(code, pct) for (_, code, _, pct, _) in etf_rows if pct is not None]
              valid.sort(key=lambda x: x[1], reverse=True)
              top_codes = [code for code, _ in valid[:5]]
              log("强势股DEBUG", f"涨幅前5板块代码: {top_codes}")
              log("强势股DEBUG", f"字典收录代码: {list(top_sectors_stocks.keys())}")
              for code in top_codes:
                  has = code in top_sectors_stocks
                  log("强势股DEBUG", f"  {code} -> {'有数据' if has else '无数据！'}")

              result = []
              checked = set()
              for code in top_codes:
                  stocks = top_sectors_stocks.get(code, [])
                  sector_name = next((s for s,c,*_ in [r for r in etf_rows] if c==code), code)
                  strong = []
                  for name, scode in stocks:
                      if scode in checked:
                          continue
                      checked.add(scode)
                      try:
                          hist = yf.Ticker(scode).history(period="5d").dropna(subset=["Close"])
                          if len(hist) < 2:
                              continue
                          prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                          vol_hist = yf.Ticker(scode).history(period="10d").dropna(subset=["Volume"])
                          avg_vol = vol_hist["Volume"].iloc[:-1].mean() if len(vol_hist) > 1 else 0
                          cur_vol = vol_hist["Volume"].iloc[-1] if len(vol_hist) > 0 else 0
                          vol_ratio = cur_vol / avg_vol if avg_vol > 0 else 1
                          pct = (last - prev) / prev * 100
                          strong.append((name, scode, last, pct, vol_ratio))
                      except:
                          continue
                  strong.sort(key=lambda x: x[3], reverse=True)
                  if strong:
                      result.append(f"【{sector_name}强势股】")  # 先加标题
                      for name, scode, last, pct, vol_ratio in strong[:3]:  # 再加股票
                          arrow = "▲" if pct > 0 else "▼"
                          vol_tag = f" 量比{vol_ratio:.1f}x" if vol_ratio > 1.5 else ""
                          result.append(f"  {name}({scode}): {last:.2f}  {arrow}{abs(pct):.2f}%{vol_tag}")

              if not result:
                  return ["强势股数据获取中..."]
              log("强势股", f"筛选完成，共{len([r for r in result if '【' not in r])}只")
              return result

          # ===== 5. 财经新闻（Google News RSS）=====
          def fetch_news():
              queries = [
                  ("A股/中国市场", "https://news.google.com/rss/search?q=A股+股市&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("科技/AI",      "https://news.google.com/rss/search?q=人工智能+科技股&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("宏观经济",     "https://news.google.com/rss/search?q=美联储+经济+利率&hl=en-US&gl=US&ceid=US:en"),
              ]
              all_news = []
              for category, url in queries:
                  try:
                      r = requests.get(url, timeout=8, headers={"User-Agent":"Mozilla/5.0"})
                      items = re.findall(r"<title><!\[CDATA\[(.+?)\]\]></title>", r.text)
                      if not items:
                          items = re.findall(r"<title>(.+?)</title>", r.text)[1:6]
                      headlines = [h.strip() for h in items[1:5] if h.strip() and "Google" not in h]
                      if headlines:
                          all_news.append(f"【{category}】")
                          all_news.extend([f"  • {h}" for h in headlines[:4]])
                  except Exception as e:
                      all_news.append(f"【{category}】获取失败: {e}")
              log("新闻", f"获取{len([n for n in all_news if '•' in n])}条")
              return all_news if all_news else ["新闻获取失败"]

          # ===== 6. 宏观日历 =====
          def macro_calendar():
              now = datetime.datetime.utcnow()
              # 重要宏观事件硬编码（2026年）
              events = [
                  (datetime.date(2026, 3, 10), "🇺🇸 美国CPI数据公布"),
                  (datetime.date(2026, 3, 17), "🇺🇸 美国零售销售数据"),
                  (datetime.date(2026, 3, 18), "🇺🇸 美联储FOMC利率决议"),
                  (datetime.date(2026, 3, 19), "🇺🇸 美联储新闻发布会"),
                  (datetime.date(2026, 3, 20), "🇯🇵 日本央行利率决议"),
                  (datetime.date(2026, 4, 1),  "🇨🇳 中国PMI数据公布"),
                  (datetime.date(2026, 4, 3),  "🇺🇸 美国非农就业数据"),
                  (datetime.date(2026, 4, 10), "🇺🇸 美国CPI数据公布"),
                  (datetime.date(2026, 4, 29), "🇺🇸 美联储FOMC利率决议"),
                  (datetime.date(2026, 5, 1),  "🇺🇸 美国非农就业数据"),
                  (datetime.date(2026, 5, 8),  "🇨🇳 中国外贸数据"),
                  (datetime.date(2026, 6, 10), "🇺🇸 美联储FOMC利率决议"),
              ]
              today = now.date()
              result = []
              for event_date, event_name in events:
                  delta = (event_date - today).days
                  if delta < 0:
                      continue
                  elif delta == 0:
                      result.append(f"🔴 今日：{event_name}")
                  elif delta == 1:
                      result.append(f"🟠 明日：{event_name}")
                  elif delta <= 7:
                      result.append(f"🟡 {delta}天后({event_date.strftime('%m/%d')})：{event_name}")
                  elif delta <= 14:
                      result.append(f"⚪ {delta}天后({event_date.strftime('%m/%d')})：{event_name}")
              if not result:
                  result = ["未来两周内无重大宏观事件"]
              log("宏观日历", f"找到{len(result)}个事件")
              return result[:6]  # 最多显示6个

          # ===== 7. Gemini AI报告 =====
          def ai_report(data_text):
              api_key = os.environ["GEMINI_API_KEY"]
              try:
                  r0 = requests.get(f"https://generativelanguage.googleapis.com/v1beta/models?key={api_key}", timeout=10)
                  models = r0.json().get("models", [])
                  usable = [m["name"].split("/")[1] for m in models
                            if "generateContent" in m.get("supportedGenerationMethods", [])
                            and "flash" in m["name"]]
                  model_name = usable[0] if usable else "gemini-2.0-flash"
                  log("Gemini", f"使用模型: {model_name}")
              except Exception as e:
                  model_name = "gemini-2.0-flash"
                  log("Gemini", f"模型查询失败: {e}")

              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_name}:generateContent?key={api_key}"
              system_instruction = (
                  "你是资深券商策略首席分析师。"
                  "报告必须100%基于提供的真实数据和具体数值。"
                  "若数据标注失败或暂无则跳过，禁止任何模板化描述。"
              )
              prompt = f"""以下是今日完整市场数据，请生成专业投资策略报告：

          {data_text}

          报告结构（每节必须引用上方具体数字和股票名称）：

          【一、全球市场与宏观风险】
          结合美股科技股涨跌数据和宏观日历事件，分析当前全球市场情绪和近期宏观风险点。

          【二、A股板块轮动分析】
          重点分析涨幅前5和跌幅前5的板块，说明资金流向逻辑，引用具体板块名称和涨跌幅数值。

          【三、强势标的精选】
          结合强势股筛选结果，点评量比较大或涨幅突出的个股，说明其所在板块逻辑和关注理由。

          【四、新闻驱动分析】
          结合今日财经新闻，分析哪些新闻可能对明日A股产生影响，指出受益或受损的板块。

          【五、风险提示】
          结合宏观事件日历和跌幅较大板块，提示近期需要规避的方向和时间节点。

          【六、明日操作策略】
          给出明日重点关注的板块和个股候选，说明进场逻辑，必须有数据支撑，约1000字总计。"""

              payload = {
                  "system_instruction": {"parts": [{"text": system_instruction}]},
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 8192}
              }
              for attempt in range(3):
                  r = requests.post(url, json=payload, timeout=60)
                  if r.status_code == 429:
                      wait = 30 * (attempt + 1)
                      log("Gemini", f"429限速，等待{wait}秒重试")
                      time.sleep(wait)
                      continue
                  r.raise_for_status()
                  text = r.json()["candidates"][0]["content"]["parts"][0]["text"]
                  log("Gemini", "报告生成成功")
                  return text
              raise Exception("Gemini重试3次失败")

          # ===== 8. HTML邮件 =====
          def to_html(data_text, report):
              rows = ""
              for line in data_text.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("====="):
                      section = line.replace("=","").strip()
                      rows += (f"<h3 style='color:#c0392b;margin:16px 0 6px;font-size:15px;"
                               f"border-left:3px solid #c0392b;padding-left:8px;'>{section}</h3>")
                  elif line.startswith("【") and line.endswith("】"):
                      rows += (f"<p style='margin:8px 0 2px;font-size:13px;font-weight:bold;"
                               f"color:#555;'>{line}</p>")
                  else:
                      has_up = "▲" in line
                      has_dn = "▼" in line
                      color = "#c0392b" if has_up else ("#27ae60" if has_dn else "#333")
                      rows += (f"<p style='margin:2px 0;font-size:13px;color:{color};"
                               f"font-family:monospace;'>{line}</p>")
              rhtml = report.replace("\n\n","</p><p style='margin:10px 0;'>").replace("\n","<br>")
              rhtml = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", rhtml)
              rhtml = f"<p style='margin:10px 0;'>{rhtml}</p>"
              return (
                  "<!DOCTYPE html><html><head>"
                  "<meta charset='utf-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1.0'>"
                  "</head>"
                  "<body style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;"
                  "max-width:640px;margin:0 auto;padding:16px;background:#f0f2f5;'>"
                  "<div style='background:#fff;border-radius:12px;padding:20px;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<h1 style='font-size:20px;color:#1a1a1a;border-bottom:3px solid #c0392b;"
                  "padding-bottom:10px;margin-top:0;'>📊 AI量化投资日报</h1>"
                  "<div style='background:#fafafa;border-radius:8px;padding:14px;"
                  "margin-bottom:16px;'>"
                  f"{rows}"
                  "</div>"
                  "<h2 style='font-size:17px;color:#c0392b;margin-bottom:12px;'>📝 AI策略报告</h2>"
                  "<div style='line-height:1.8;color:#222;font-size:15px;'>"
                  f"{rhtml}"
                  "</div>"
                  "<div style='font-size:12px;color:#999;border-top:1px solid #eee;"
                  "margin-top:20px;padding-top:10px;'>"
                  "本报告由AI基于实时数据自动生成，不构成投资建议。</div>"
                  "</div></body></html>"
              )

          def send_mail(subject, data_text, report):
              sender = os.environ["EMAIL_USER"]
              password = os.environ["EMAIL_PASS"]
              msg = MIMEMultipart("alternative")
              msg["Subject"] = subject
              msg["From"] = sender
              msg["To"] = sender
              msg.attach(MIMEText(f"{data_text}\n\n{report}", "plain", "utf-8"))
              msg.attach(MIMEText(to_html(data_text, report), "html", "utf-8"))
              with smtplib.SMTP_SSL("smtp.qq.com", 465) as s:
                  s.login(sender, password)
                  s.sendmail(sender, sender, msg.as_string())
              log("邮件", "发送成功")

          # ===== 主程序 =====
          def main():
              now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
              log("启动", now)

              north   = northbound_funds()
              us      = us_tech_stocks()
              sector_result, etf_rows = sector_etf()
              strong  = strong_stocks(etf_rows)
              news    = fetch_news()
              macro   = macro_calendar()

              data_text = "\n".join(
                  ["===== 北向资金 ====="]+north+
                  ["\n===== 美股科技股 ====="]+us+
                  ["\n===== A股板块ETF（按涨跌幅排序）====="]+sector_result+
                  ["\n===== 强势股筛选（涨幅前5板块龙头）====="]+strong+
                  ["\n===== 今日财经新闻 ====="]+news+
                  ["\n===== 宏观事件日历 ====="]+macro
              )
              log("数据汇总", f"\n{data_text}")
              report = ai_report(data_text)
              subject = f"AI量化投资日报 {now[:10]}"
              send_mail(subject, data_text, report)

          main()
          PYEOF
