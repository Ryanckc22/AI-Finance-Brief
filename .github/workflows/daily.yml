              top_codes = [code for code, _ in valid[:5]]

              result = []
              for code in top_codes:
                  stocks = midcap_stocks.get(code, [])
                  sector_name = next((s for s,c,*_ in etf_rows if c==code), code)
                  if not stocks:
                      continue
                  candidates = []
                  for name, scode in stocks:
                      try:
                          hist = yf.Ticker(scode).history(period="5d").dropna(subset=["Close"])
                          if len(hist) < 2:
                              continue
                          prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                          vol_hist = yf.Ticker(scode).history(period="10d").dropna(subset=["Volume"])
                          avg_vol = vol_hist["Volume"].iloc[:-1].mean() if len(vol_hist) > 1 else 0
                          cur_vol = vol_hist["Volume"].iloc[-1] if len(vol_hist) > 0 else 0
                          vol_ratio = cur_vol / avg_vol if avg_vol > 0 else 1
                          pct = (last - prev) / prev * 100
                          candidates.append((name, scode, last, pct, vol_ratio))
                      except:
                          continue
                  candidates.sort(key=lambda x: x[3], reverse=True)
                  if candidates:
                      result.append(f"【{sector_name} · 中盘股100-500亿】")
                      for name, scode, last, pct, vol_ratio in candidates[:5]:
                          arrow = "▲" if pct > 0 else "▼"
                          vol_tag = f" 量比{vol_ratio:.1f}x" if vol_ratio >= 1.0 else ""
                          result.append(f"  {name}({scode}): {last:.2f}  {arrow}{abs(pct):.2f}%{vol_tag}")

              log("中盘强势股", f"筛选完成")
              return result if result else ["中盘强势股暂无数据"], midcap_stocks

          # ===== 6c. 涨停后高位整理股票筛选 =====
          def find_limit_up_stocks(top_sectors_stocks, midcap_stocks, etf_rows):
              # 合并所有股票池（去重）
              all_stocks = {}
              valid = [(code, pct) for (_, code, _, pct, _) in etf_rows if pct is not None]
              valid.sort(key=lambda x: x[1], reverse=True)
              top_codes = [code for code, _ in valid[:5]]
              for code in top_codes:
                  for name, scode in top_sectors_stocks.get(code, []):
                      all_stocks[scode] = name
                  for name, scode in midcap_stocks.get(code, []):
                      all_stocks[scode] = name

              log("涨停筛选", f"扫描股票池共{len(all_stocks)}只")
              results = []
              for scode, name in all_stocks.items():
                  try:
                      hist = yf.Ticker(scode).history(period="20d").dropna(subset=["Close","Open"])
                      if len(hist) < 5:
                          continue
                      # 只看最近15个交易日
                      hist = hist.tail(15)
                      closes = hist["Close"].values
                      opens  = hist["Open"].values
                      dates  = hist.index

                      # 找前10个交易日内的涨停（涨幅>=9.8%）
                      limit_idx = None
                      for i in range(len(hist) - 2, max(len(hist) - 12, -1), -1):
                          if i < 1:
                              continue
                          pct_chg = (closes[i] - closes[i-1]) / closes[i-1] * 100
                          if pct_chg >= 9.8:
                              limit_idx = i
                              break

                      if limit_idx is None:
                          continue

                      # 涨停后每天开盘价不低于涨停当日开盘价
                      limit_open = opens[limit_idx]
                      hold = True
                      for j in range(limit_idx + 1, len(hist)):
                          if opens[j] < limit_open * 0.995:  # 允许0.5%误差
                              hold = False
                              break

                      if not hold:
                          continue

                      # 计算当前涨跌幅和量比
                      last  = closes[-1]
                      prev  = closes[-2]
                      pct   = (last - prev) / prev * 100
                      vol_hist = yf.Ticker(scode).history(period="15d").dropna(subset=["Volume"])
                      avg_vol  = vol_hist["Volume"].iloc[:-1].mean() if len(vol_hist) > 1 else 0
                      cur_vol  = vol_hist["Volume"].iloc[-1] if len(vol_hist) > 0 else 0
                      vol_ratio = cur_vol / avg_vol if avg_vol > 0 else 1

                      limit_date = dates[limit_idx].strftime("%m/%d")
                      days_since = len(hist) - 1 - limit_idx
                      arrow = "▲" if pct > 0 else ("▼" if pct < 0 else "—")
                      results.append((name, scode, last, pct, vol_ratio, limit_date, days_since))

                  except:
                      continue

              results.sort(key=lambda x: x[3], reverse=True)
              output = []
              if results:
                  for name, scode, last, pct, vol_ratio, limit_date, days_since in results:
                      arrow = "▲" if pct > 0 else ("▼" if pct < 0 else "—")
                      vol_tag = f" 量比{vol_ratio:.1f}x" if vol_ratio >= 1.0 else ""
                      output.append(
                          f"  {name}({scode}): {last:.2f}  {arrow}{abs(pct):.2f}%{vol_tag}"
                          f"  [涨停:{limit_date} {days_since}天前]"
                      )
              else:
                  output = ["暂无符合条件的股票"]
              log("涨停筛选", f"找到{len(results)}只符合条件的股票")
              return output

          # ===== 7. Gemini AI报告 =====
          def ai_report(data_text):
              api_key = os.environ["GEMINI_API_KEY"]
              try:
                  r0 = requests.get(f"https://generativelanguage.googleapis.com/v1beta/models?key={api_key}", timeout=10)
                  models = r0.json().get("models", [])
                  usable = [m["name"].split("/")[1] for m in models
                            if "generateContent" in m.get("supportedGenerationMethods", [])
                            and "flash" in m["name"]]
                  model_name = usable[0] if usable else "gemini-2.0-flash"
                  log("Gemini", f"使用模型: {model_name}")
              except Exception as e:
                  model_name = "gemini-2.0-flash"
                  log("Gemini", f"模型查询失败: {e}")

              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_name}:generateContent?key={api_key}"
              system_instruction = (
                  "你是资深券商策略首席分析师。"
                  "报告必须100%基于提供的真实数据和具体数值。"
                  "若数据标注失败或暂无则跳过，禁止任何模板化描述。"
              )
              prompt = f"""以下是今日完整市场数据，请生成专业投资策略报告：

          {data_text}

          报告结构（每节必须引用上方具体数字和股票名称）：

          【一、全球市场与宏观风险】
          结合美股科技股涨跌数据和宏观日历事件，分析当前全球市场情绪和近期宏观风险点。

          【二、A股板块轮动分析】
          重点分析涨幅前5和跌幅前5的板块，说明资金流向逻辑，引用具体板块名称和涨跌幅数值。

          【三、强势标的精选】
          结合强势股筛选结果，点评量比较大或涨幅突出的个股，说明其所在板块逻辑和关注理由。

          【四、新闻驱动分析】
          结合今日财经新闻，分析哪些新闻可能对明日A股产生影响，指出受益或受损的板块。

          【五、风险提示】
          结合宏观事件日历和跌幅较大板块，提示近期需要规避的方向和时间节点。

          【六、明日操作策略】
          给出明日重点关注的板块和个股候选，说明进场逻辑，必须有数据支撑，约1000字总计。"""

              payload = {
                  "system_instruction": {"parts": [{"text": system_instruction}]},
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 8192}
              }
              for attempt in range(3):
                  r = requests.post(url, json=payload, timeout=60)
                  if r.status_code == 429:
                      wait = 30 * (attempt + 1)
                      log("Gemini", f"429限速，等待{wait}秒重试")
                      time.sleep(wait)
                      continue
                  r.raise_for_status()
                  text = r.json()["candidates"][0]["content"]["parts"][0]["text"]
                  log("Gemini", "报告生成成功")
                  return text
              raise Exception("Gemini重试3次失败")

          # ===== 8. HTML邮件 =====
          def to_html(data_text, report):
              rows = ""
              for line in data_text.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("====="):
                      section = line.replace("=","").strip()
                      rows += (f"<h3 style='color:#c0392b;margin:16px 0 6px;font-size:15px;"
                               f"border-left:3px solid #c0392b;padding-left:8px;'>{section}</h3>")
                  elif line.startswith("【") and line.endswith("】"):
                      rows += (f"<p style='margin:8px 0 2px;font-size:13px;font-weight:bold;"
                               f"color:#555;'>{line}</p>")
                  else:
                      has_up = "▲" in line
                      has_dn = "▼" in line
                      color = "#c0392b" if has_up else ("#27ae60" if has_dn else "#333")
                      rows += (f"<p style='margin:2px 0;font-size:13px;color:{color};"
                               f"font-family:monospace;'>{line}</p>")
              rhtml = report.replace("\n\n","</p><p style='margin:10px 0;'>").replace("\n","<br>")
              rhtml = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", rhtml)
              rhtml = f"<p style='margin:10px 0;'>{rhtml}</p>"
              return (
                  "<!DOCTYPE html><html><head>"
                  "<meta charset='utf-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1.0'>"
                  "</head>"
                  "<body style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;"
                  "max-width:640px;margin:0 auto;padding:16px;background:#f0f2f5;'>"
                  "<div style='background:#fff;border-radius:12px;padding:20px;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<h1 style='font-size:20px;color:#1a1a1a;border-bottom:3px solid #c0392b;"
                  "padding-bottom:10px;margin-top:0;'>📊 AI量化投资日报</h1>"
                  "<div style='background:#fafafa;border-radius:8px;padding:14px;"
                  "margin-bottom:16px;'>"
                  f"{rows}"
                  "</div>"
                  "<h2 style='font-size:17px;color:#c0392b;margin-bottom:12px;'>📝 AI策略报告</h2>"
                  "<div style='line-height:1.8;color:#222;font-size:15px;'>"
                  f"{rhtml}"
                  "</div>"
                  "<div style='font-size:12px;color:#999;border-top:1px solid #eee;"
                  "margin-top:20px;padding-top:10px;'>"
                  "本报告由AI基于实时数据自动生成，不构成投资建议。</div>"
                  "</div></body></html>"
              )

          def send_mail(subject, data_text, report):
              sender = os.environ["EMAIL_USER"]
              password = os.environ["EMAIL_PASS"]
              msg = MIMEMultipart("alternative")
              msg["Subject"] = subject
              msg["From"] = sender
              msg["To"] = sender
              msg.attach(MIMEText(f"{data_text}\n\n{report}", "plain", "utf-8"))
              msg.attach(MIMEText(to_html(data_text, report), "html", "utf-8"))
              with smtplib.SMTP_SSL("smtp.qq.com", 465) as s:
                  s.login(sender, password)
                  s.sendmail(sender, sender, msg.as_string())
              log("邮件", "发送成功")

