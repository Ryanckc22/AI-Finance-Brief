          # ===== 4b. NewsAPI 板块新闻 =====
          def fetch_sector_news(sector_code, sector_name):
              api_key = os.environ.get("NEWS_API_KEY", "")
              if not api_key:
                  return []
              keyword = SECTOR_KEYWORDS.get(sector_code, sector_name)
              try:
                  url = (f"https://newsapi.org/v2/everything"
                         f"?q={requests.utils.quote(keyword)}"
                         f"&language=zh"
                         f"&sortBy=publishedAt"
                         f"&pageSize=3"
                         f"&apiKey={api_key}")
                  r = requests.get(url, timeout=8)
                  articles = r.json().get("articles", [])
                  result = []
                  for a in articles[:3]:
                      title = a.get("title","").split(" - ")[0].strip()
                      pub   = a.get("publishedAt","")[:16].replace("T"," ")
                      # 转北京时间（UTC+8）
                      try:
                          import datetime as _dt
                          dt = _dt.datetime.strptime(pub, "%Y-%m-%d %H:%M")
                          dt_bj = dt + _dt.timedelta(hours=8)
                          pub = dt_bj.strftime("%m/%d %H:%M")
                      except:
                          pass
                      if title:
                          result.append(f"  📰 [{pub}] {title}")
                  return result
              except:
                  return []

