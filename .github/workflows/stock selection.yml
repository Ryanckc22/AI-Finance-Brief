name: A股涨停整理扫描

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 北京时间15:30
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance pandas

      - name: Run scanner
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'

          import akshare as ak
          import yfinance as yf
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import smtplib,os,datetime
          from email.mime.text import MIMEText

          print("获取A股列表...")

          df = ak.stock_info_a_code_name()

          stocks=[]

          for _,row in df.iterrows():

              code=str(row["code"]).zfill(6)
              name=row["name"]

              if "ST" in name or "st" in name:
                  continue

              if code.startswith("6"):
                  ticker=code+".SS"
              else:
                  ticker=code+".SZ"

              stocks.append((ticker,name))

          print("股票数量:",len(stocks))


          def check_stock(item):

              ticker,name=item

              try:

                  hist=yf.Ticker(ticker).history(period="3mo")

                  if len(hist)<60:
                      return None

                  hist=hist.tail(15)

                  close=hist["Close"].values
                  openp=hist["Open"].values

                  n=len(close)

                  first_limit=None

                  for i in range(max(n-11,1),n-1):

                      pct=(close[i]-close[i-1])/close[i-1]*100

                      if pct>=9.5:
                          first_limit=i
                          break

                  if first_limit is None:
                      return None

                  base_open=openp[first_limit]

                  for j in range(first_limit+1,n):

                      if close[j]<base_open:
                          return None

                  return ticker+" "+name

              except:
                  return None


          print("开始扫描...")

          results=[]

          with ThreadPoolExecutor(max_workers=20) as exe:

              futures=[exe.submit(check_stock,s) for s in stocks]

              for f in as_completed(futures):

                  r=f.result()

                  if r:
                      results.append(r)


          print("符合条件:",len(results))


          now=datetime.datetime.now().strftime("%Y-%m-%d")

          text="A股涨停整理扫描 "+now+"\n\n"

          if len(results)==0:
              text+="今日没有符合条件股票"
          else:
              for r in results:
                  text+=r+"\n"


          print(text)


          sender=os.environ["EMAIL_USER"]
          password=os.environ["EMAIL_PASS"]

          msg=MIMEText(text,"plain","utf-8")

          msg["Subject"]="A股涨停整理扫描 "+now
          msg["From"]=sender
          msg["To"]=sender

          server=smtplib.SMTP_SSL("smtp.qq.com",465)

          server.login(sender,password)

          server.sendmail(sender,sender,msg.as_string())

          server.quit()

          print("邮件发送成功")

          PYEOF
