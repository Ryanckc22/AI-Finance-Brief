          # ===== 6c. 涨停后高位整理 + 6d. 明日打板候选（并发扫描大池）=====
          def scan_large_pool(etf_rows):
              """
              并发扫描CSI_POOL，找出：
              A. 涨停后高位整理：前10日涨停，之后开盘不破涨停开盘价
              B. 明日打板候选：今日涨停+热门板块+连板<=3+板块内>=2只涨停
              非ST，非次新股（上市>180天）
              """
              from concurrent.futures import ThreadPoolExecutor, as_completed
              import datetime as _dt

              # 动态获取完整股票池
              scan_pool = build_stock_pool()

              hot_sectors = set()
              for sector, code, last, pct, d in etf_rows:
                  if pct is not None and pct >= 1.0:
                      hot_sectors.add(code)

              # 反查：股票代码 -> 板块ETF代码
              stock_to_sector = {}
              for code_dict in [top_sectors_stocks_global, midcap_stocks_global]:
                  for etf_code, stocks in code_dict.items():
                      for name, scode in stocks:
                          stock_to_sector[scode] = etf_code
              # 大池股票默认归入沪深300板块（用于热门板块判断）
              for scode in scan_pool:
                  if scode not in stock_to_sector:
                      stock_to_sector[scode] = "510300.SS"

              limit_hold   = []  # 高位整理结果
              candidates   = []  # 打板候选结果
              sector_limit_count = {}

              def check_stock(scode):
                  try:
                      hist = yf.Ticker(scode).history(period="25d").dropna(subset=["Close","Open","Volume"])
                      if len(hist) < 10:
                          return None
                      # 过滤次新股（上市<180天）
                      if len(hist) < 90:
                          return None
                      closes = hist["Close"].values
                      opens  = hist["Open"].values
                      vols   = hist["Volume"].values
                      dates  = hist.index

                      # 今日涨幅
                      today_pct = (closes[-1] - closes[-2]) / closes[-2] * 100

                      # ===== A. 高位整理判断 =====
                      limit_idx = None
                      for i in range(len(closes)-2, max(len(closes)-12, 0), -1):
                          if i < 1: break
                          if (closes[i]-closes[i-1])/closes[i-1]*100 >= 9.8:
                              limit_idx = i
                              break
                      hold_result = None
                      if limit_idx is not None:
                          limit_open = opens[limit_idx]
                          hold = all(opens[j] >= limit_open * 0.995
                                     for j in range(limit_idx+1, len(hist)))
                          if hold:
                              avg_vol = vols[-6:-1].mean()
                              vol_ratio = vols[-1]/avg_vol if avg_vol > 0 else 1
                              days_since = len(hist)-1-limit_idx
                              limit_date = dates[limit_idx].strftime("%m/%d")
                              hold_result = {
                                  "scode": scode,
                                  "close": closes[-1],
                                  "pct": today_pct,
                                  "vol_ratio": vol_ratio,
                                  "limit_date": limit_date,
                                  "days_since": days_since,
                              }

                      # ===== B. 打板候选判断 =====
                      cand_result = None
                      etf_code = stock_to_sector.get(scode, "")
                      if today_pct >= 9.8 and etf_code in hot_sectors:
                          consec = 1
                          for i in range(len(closes)-2, max(len(closes)-5,0), -1):
                              if i < 1: break
                              if (closes[i]-closes[i-1])/closes[i-1]*100 >= 9.8:
                                  consec += 1
                              else:
                                  break
                          if consec <= 3:
                              avg_vol = vols[-6:-1].mean()
                              vol_ratio = vols[-1]/avg_vol if avg_vol > 0 else 1
                              score = vol_ratio * (4 - consec)
                              cand_result = {
                                  "scode": scode,
                                  "etf_code": etf_code,
                                  "close": closes[-1],
                                  "consec": consec,
                                  "vol_ratio": vol_ratio,
                                  "score": score,
                              }

                      return (hold_result, cand_result)
                  except:
                      return None

              # 并发扫描
              with ThreadPoolExecutor(max_workers=15) as executor:
                  futures = {executor.submit(check_stock, s): s for s in scan_pool}
                  for future in as_completed(futures):
                      res = future.result()
                      if res is None:
                          continue
                      hold_result, cand_result = res
                      if hold_result:
                          limit_hold.append(hold_result)
                      if cand_result:
                          candidates.append(cand_result)
                          ec = cand_result["etf_code"]
                          sector_limit_count[ec] = sector_limit_count.get(ec, 0) + 1

              # 格式化高位整理
              limit_hold.sort(key=lambda x: x["pct"], reverse=True)
              out_hold = []
              for s in limit_hold:
                  arrow = "▲" if s["pct"] > 0 else "▼"
                  out_hold.append(
                      f"  {s['scode']}: {s['close']:.2f}"
                      f"  {arrow}{abs(s['pct']):.2f}%  量比{s['vol_ratio']:.1f}x"
                      f"  [涨停:{s['limit_date']} {s['days_since']}天前]"
                  )
              if not out_hold:
                  out_hold = ["暂无符合条件的股票"]

              # 格式化打板候选（过滤板块内<2只的）
              qualified = [c for c in candidates if sector_limit_count.get(c["etf_code"],0) >= 2]
              qualified.sort(key=lambda x: x["score"], reverse=True)
              out_cand = []
              if qualified:
                  out_cand.append(f"共{len(qualified)}只候选 | ⚠️次日自行观察竞价，高开>=2%再介入 | 跌破涨停价当日止损")
                  out_cand.append("优先级：首板>2连板>3连板，量比越大越好，🔥=热门板块验证")
                  for c in qualified[:10]:
                      sector_name = next((s for s,code,*_ in etf_rows if code==c["etf_code"]), c["etf_code"])
                      consec_tag = "首板" if c["consec"]==1 else f"{c['consec']}连板"
                      hot = "🔥" if sector_limit_count.get(c["etf_code"],0)>=2 else "  "
                      out_cand.append(
                          f"  {hot}{c['scode']}: {c['close']:.2f}"
                          f"  [{consec_tag}]  量比{c['vol_ratio']:.1f}x  [{sector_name}]"
                      )
              else:
                  out_cand = ["今日大池内暂无符合条件的打板候选"]

              log("大池扫描", f"高位整理{len(limit_hold)}只，打板候选{len(qualified)}只")
              return out_hold, out_cand

                    # ===== 6d. 明日打板候选（涨停+热门板块+质量过滤）=====
          def find_tomorrow_candidates(etf_rows, top_sectors_stocks, midcap_stocks):
              """
              筛选逻辑：
              1. 今日涨停（涨幅>=9.8%）
              2. 属于热门板块（板块ETF今日涨幅>=1%）
              3. 板块内涨停股>=2只（热门板块验证）
              4. 连续涨停<=3天（避免追高）
              5. 非ST股
              次日策略：高开>=2%确认动能后介入，跌破涨停价止损
              """
              all_stocks = {}
              for code_dict in [top_sectors_stocks, midcap_stocks]:
                  for etf_code, stocks in code_dict.items():
                      for name, scode in stocks:
                          all_stocks[scode] = (name, etf_code)

              hot_sectors = set()
              for sector, code, last, pct, d in etf_rows:
                  if pct is not None and pct >= 1.0:
                      hot_sectors.add(code)
              log("打板候选", f"热门板块{len(hot_sectors)}个，扫描{len(all_stocks)}只股票")

              limit_up_today = []
              sector_limit_count = {}

              for scode, (name, etf_code) in all_stocks.items():
                  if "ST" in name or "st" in name:
                      continue
                  if etf_code not in hot_sectors:
                      continue
                  try:
                      hist = yf.Ticker(scode).history(period="20d").dropna(subset=["Close","Volume"])
                      if len(hist) < 5:
                          continue
                      closes = hist["Close"].values
                      today_pct = (closes[-1] - closes[-2]) / closes[-2] * 100
                      if today_pct < 9.8:
                          continue
                      # 连续涨停天数
                      consec = 1
                      for i in range(len(closes)-2, max(len(closes)-5, 0), -1):
                          if i < 1:
                              break
                          if (closes[i] - closes[i-1]) / closes[i-1] * 100 >= 9.8:
                              consec += 1
                          else:
                              break
                      if consec > 3:
                          continue
                      avg_vol = hist["Volume"].iloc[-6:-1].mean()
                      cur_vol = hist["Volume"].iloc[-1]
                      vol_ratio = cur_vol / avg_vol if avg_vol > 0 else 1
                      score = vol_ratio * (4 - consec)
                      limit_up_today.append((name, scode, etf_code, closes[-1], consec, vol_ratio, score))
                      sector_limit_count[etf_code] = sector_limit_count.get(etf_code, 0) + 1
                  except:
                      continue

              # 热门板块验证：板块内>=2只涨停（严格模式，不放宽）
              qualified = [s for s in limit_up_today if sector_limit_count.get(s[2], 0) >= 2]
              qualified.sort(key=lambda x: x[6], reverse=True)

              result = []
              if qualified:
                  result.append(f"共{len(qualified)}只候选 | ⚠️次日自行观察竞价，高开>=2%再介入 | 跌破涨停价当日止损")
                  result.append("优先级：首板>2连板>3连板，量比越大越好，🔥=热门板块验证")
                  for name, scode, etf_code, close, consec, vol_ratio, score in qualified[:10]:
                      sector_name = next((s for s,c,*_ in etf_rows if c==etf_code), etf_code)
                      consec_tag = "首板" if consec == 1 else f"{consec}连板"
                      hot_tag = "🔥" if sector_limit_count.get(etf_code, 0) >= 2 else "  "
                      result.append(
                          f"  {hot_tag}{name}({scode}): {close:.2f}"
                          f"  [{consec_tag}]  量比{vol_ratio:.1f}x  [{sector_name}]"
                      )
              else:
                  result = ["今日股票池内暂无涨停候选"]

              log("打板候选", f"筛出{len(qualified)}只")
              return result

          # ===== AI报告 =====
          def ai_report(data_text):
              api_key = os.environ["GEMINI_API_KEY"]
              try:
                  r0 = requests.get(f"https://generativelanguage.googleapis.com/v1beta/models?key={api_key}", timeout=10)
                  models = r0.json().get("models", [])
                  usable = [m["name"].split("/")[1] for m in models
                            if "generateContent" in m.get("supportedGenerationMethods", [])
                            and "flash" in m["name"]]
                  model_name = usable[0] if usable else "gemini-2.0-flash"
                  log("Gemini", f"使用模型: {model_name}")
              except Exception as e:
                  model_name = "gemini-2.0-flash"
                  log("Gemini", f"模型查询失败: {e}")
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_name}:generateContent?key={api_key}"
              system_instruction = (
                  "你是资深券商策略首席分析师。"
                  "报告必须100%基于提供的真实数据和具体数值。"
                  "若数据标注失败或暂无则跳过，禁止任何模板化描述。"
              )
              prompt = f"""以下是今日完整市场数据，请生成专业投资策略报告：

          {data_text}

          报告结构（每节必须引用上方具体数字和股票名称）：

          【一、全球市场与宏观风险】
          结合美股科技股涨跌数据和宏观日历事件，分析当前全球市场情绪和近期宏观风险点。

          【二、A股板块轮动分析】
          重点分析涨幅前5和跌幅前5的板块，说明资金流向逻辑，引用具体板块名称和涨跌幅数值。

          【三、强势标的精选】
          结合强势股和中盘股筛选结果，点评量比较大或涨幅突出的个股，说明其所在板块逻辑和关注理由。

          【四、打板与整理机会】
          结合涨停高位整理和明日打板候选数据，分析短线机会，说明入场逻辑和止损位。

          【五、新闻驱动分析】
          结合今日财经新闻，分析哪些新闻可能对明日A股产生影响，指出受益或受损的板块。

          【六、风险提示】
          结合宏观事件日历和跌幅较大板块，提示近期需要规避的方向和时间节点。

          【七、明日操作策略】
          给出明日重点关注的板块和个股候选，说明进场逻辑，必须有数据支撑，约1000字总计。"""
              payload = {
                  "system_instruction": {"parts": [{"text": system_instruction}]},
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 8192}
              }
              for attempt in range(3):
                  r = requests.post(url, json=payload, timeout=60)
                  if r.status_code == 429:
                      wait = 30 * (attempt + 1)
                      log("Gemini", f"429限速，等待{wait}秒重试")
                      time.sleep(wait)
                      continue
                  r.raise_for_status()
                  text = r.json()["candidates"][0]["content"]["parts"][0]["text"]
                  log("Gemini", "报告生成成功")
                  return text
              raise Exception("Gemini重试3次失败")

          # ===== HTML邮件 =====
          def to_html(data_text, report):
              rows = ""
              for line in data_text.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("====="):
                      section = line.replace("=","").strip()
                      rows += (f"<h3 style='color:#c0392b;margin:16px 0 6px;font-size:15px;"
                               f"border-left:3px solid #c0392b;padding-left:8px;'>{section}</h3>")
                  elif line.startswith("【") and line.endswith("】"):
                      rows += (f"<p style='margin:8px 0 2px;font-size:13px;font-weight:bold;"
                               f"color:#555;'>{line}</p>")
                  else:
                      has_up = "▲" in line
                      has_dn = "▼" in line
                      color = "#c0392b" if has_up else ("#27ae60" if has_dn else "#333")
                      rows += (f"<p style='margin:2px 0;font-size:13px;color:{color};"
                               f"font-family:monospace;'>{line}</p>")
              rhtml = report.replace("\n\n","</p><p style='margin:10px 0;'>").replace("\n","<br>")
              rhtml = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", rhtml)
              rhtml = f"<p style='margin:10px 0;'>{rhtml}</p>"
              return (
                  "<!DOCTYPE html><html><head>"
                  "<meta charset='utf-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1.0'>"
                  "</head>"
                  "<body style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;"
                  "max-width:640px;margin:0 auto;padding:16px;background:#f0f2f5;'>"
                  "<div style='background:#fff;border-radius:12px;padding:20px;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<h1 style='font-size:20px;color:#1a1a1a;border-bottom:3px solid #c0392b;"
                  "padding-bottom:10px;margin-top:0;'>📊 AI量化投资日报</h1>"
                  "<div style='background:#fafafa;border-radius:8px;padding:14px;margin-bottom:16px;'>"
                  f"{rows}"
                  "</div>"
                  "<h2 style='font-size:17px;color:#c0392b;margin-bottom:12px;'>📝 AI策略报告</h2>"
                  "<div style='line-height:1.8;color:#222;font-size:15px;'>"
                  f"{rhtml}"
                  "</div>"
                  "<div style='font-size:12px;color:#999;border-top:1px solid #eee;"
                  "margin-top:20px;padding-top:10px;'>"
                  "本报告由AI基于实时数据自动生成，不构成投资建议。</div>"
                  "</div></body></html>"
              )

          def send_mail(subject, data_text, report):
              sender = os.environ["EMAIL_USER"]
              password = os.environ["EMAIL_PASS"]
              msg = MIMEMultipart("alternative")
              msg["Subject"] = subject
              msg["From"] = sender
              msg["To"] = sender
              msg.attach(MIMEText(f"{data_text}\n\n{report}", "plain", "utf-8"))
              msg.attach(MIMEText(to_html(data_text, report), "html", "utf-8"))
              with smtplib.SMTP_SSL("smtp.qq.com", 465) as s:
                  s.login(sender, password)
                  s.sendmail(sender, sender, msg.as_string())
              log("邮件", "发送成功")

