name: A股今日涨停扫描（极速版）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'   # 北京时间收盘后运行

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas numpy

      - name: Run scan
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'
          import akshare as ak
          import pandas as pd
          import datetime, os, smtplib
          from email.mime.text import MIMEText

          print("获取全市场实时行情...")
          df = ak.stock_zh_a_spot_em()

          # 检查列名
          print("列名：", df.columns.tolist())

          # 去除ST
          df = df[~df['名称'].str.contains("ST|st")]

          # 假设次新股已超过60交易日
          # 涨停筛选
          df['涨幅'] = df['涨跌幅'].str.rstrip('%').astype(float)
          limit_up = df[df['涨幅'] >= 9.8]

          print(f"符合条件股票数量: {len(limit_up)}")

          # 格式化邮件内容
          now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
          if len(limit_up) == 0:
              text = f"{now}\n今日暂无涨停股票"
          else:
              text = f"{now}\n今日涨停股票:\n代码 名称 最新价 涨幅\n"
              for _, row in limit_up.iterrows():
                  text += f"{row['代码']} {row['名称']} {row['最新价']} {row['涨幅']:.2f}%\n"

          print(text)

          # 发送邮件
          sender = os.environ['EMAIL_USER']
          password = os.environ['EMAIL_PASS']
          msg = MIMEText(text, 'plain', 'utf-8')
          msg['Subject'] = f"A股今日涨停扫描 {now}"
          msg['From'] = sender
          msg['To'] = sender

          with smtplib.SMTP_SSL("smtp.qq.com", 465) as server:
              server.login(sender, password)
              server.sendmail(sender, sender, msg.as_string())

          print("邮件发送成功")
          PYEOF
