              "非银金融":     "512880.SS",
              "房地产":       "510300.SS",
              "建筑材料":     "510300.SS",
              "建筑装饰":     "510720.SS",
              "交通运输":     "510720.SS",
              "公用事业":     "510880.SS",
              "环保":         "510300.SS",
              "传媒":         "512720.SS",
              "社会服务":     "510300.SS",
              "综合":         "510300.SS",
          }

          def get_stock_sector_etf(scode):
              """
              查询单股申万行业，映射到最近的ETF板块代码
              返回 (etf_code, sector_label)
              """
              import akshare as _ak
              code = scode.replace(".SS","").replace(".SZ","")
              try:
                  df = _ak.stock_individual_info_em(symbol=code)
                  # 找行业字段
                  for kw in ["行业","所属行业","申万行业","板块"]:
                      row = df[df["item"].str.contains(kw, na=False)]
                      if len(row) > 0:
                          industry = str(row.iloc[0]["value"]).strip()
                          # 用申万一级行业关键词匹配
                          for sw_key, etf_code in SW_TO_ETF.items():
                              if sw_key in industry:
                                  return etf_code, industry
                          return "510300.SS", industry  # 找到行业但无匹配，归沪深300
              except:
                  pass
              # 兜底：用代码前缀
              if code.startswith("688"):
                  return "588000.SS", "科创板"
              if code.startswith("300"):
                  return "159949.SZ", "创业板"
              return "510300.SS", "其他"

          # ===== 7. 高位整理扫描（先筛价格走势，再查板块）=====
          def scan_limit_hold(etf_rows):
              """
              逻辑：
              ① 全A股（去ST，去次新股<60个交易日）
              ② 取最近15个交易日数据（覆盖10个交易日窗口+缓冲）
              ③ 在最近10个交易日（closes[-11] 到 closes[-2]）内，
                 找到【最早的】那个涨停日（涨幅>=9.5%）作为基准日
              ④ 从基准日起，到今日，每日收盘价 >= 基准日开盘价
              ⑤ 符合条件后，再查该股申万行业→映射ETF板块
              ⑥ 按板块ETF今日涨跌幅降序，板块内按个股涨幅降序输出
              """
              from concurrent.futures import ThreadPoolExecutor, as_completed
              from collections import defaultdict

              scan_pool = build_stock_pool()

              # ETF涨跌幅字典
              etf_pct_map = {}
              for sector, code, last, pct, d in etf_rows:
                  if pct is not None:
                      etf_pct_map[code] = (sector, pct)

              # 股票名称字典
              stock_names = {}
              try:
                  import akshare as _ak
                  _df = _ak.stock_sh_a_spot_em()
                  _df2 = _ak.stock_sz_a_spot_em()
                  import pandas as _pd
                  _all = _pd.concat([_df, _df2], ignore_index=True)
                  name_col = "名称" if "名称" in _all.columns else _all.columns[1]
                  code_col = "代码" if "代码" in _all.columns else _all.columns[0]
                  for _, row in _all.iterrows():
                      c = str(row[code_col]).zfill(6)
                      yf_c = c + ".SS" if c.startswith(("6","5")) else c + ".SZ"
                      stock_names[yf_c] = str(row[name_col])
              except:
                  pass

              # ===== 第一步：纯价格走势筛选（并发）=====
              qualified = []  # [(scode, name, close, today_pct, vol_ratio, base_open, base_date, days_since)]

              def check_stock(scode):
                  try:
                      hist = yf.Ticker(scode).history(period="3mo").dropna(
                          subset=["Close","Open","Volume"])
                      # 过滤次新股
                      if len(hist) < 60:
                          return None
                      # 取最近15天（10天窗口+5天缓冲）
                      hist = hist.tail(15)
                      if len(hist) < 11:
                          return None

                      closes = hist["Close"].values
                      opens  = hist["Open"].values
                      vols   = hist["Volume"].values
                      dates  = hist.index
                      n = len(closes)

                      today_close = closes[-1]
                      today_pct   = (closes[-1] - closes[-2]) / closes[-2] * 100

                      # 在最近10个交易日（索引 n-11 到 n-2）内找【最早的】涨停
                      # n-1 = 今日（不参与搜索，今日涨停不算整理）
                      # n-2 = 昨日（搜索终点，最近）
                      # n-11 = 10天前（搜索起点，最早）
                      first_limit_idx = None
                      search_start = max(n - 11, 1)   # 最早：10天前
                      search_end   = n - 1             # 最近：昨天（不含今日）
                      for i in range(search_start, search_end):
                          if i < 1:
                              continue
                          if (closes[i] - closes[i-1]) / closes[i-1] * 100 >= 9.5:
                              first_limit_idx = i      # 找到最早的涨停，记录后继续找更早的
                              break                     # range从早到晚，第一个就是最早的

                      if first_limit_idx is None:
                          return None

                      # 基准线 = 最早涨停日的开盘价
                      base_open  = opens[first_limit_idx]
                      base_date  = dates[first_limit_idx].strftime("%m/%d")
                      days_since = n - 1 - first_limit_idx  # 距今天数

                      # 从基准日（含）之后到今日，每日收盘 >= base_open
                      hold = all(
                          closes[j] >= base_open
                          for j in range(first_limit_idx + 1, n)
                      )
                      if not hold:
                          return None

                      # 量比
                      avg_vol   = vols[max(n-7,0):n-1].mean()
                      vol_ratio = vols[-1] / avg_vol if avg_vol > 0 else 1

                      sname = stock_names.get(scode, scode)
                      return {
                          "scode":      scode,
                          "name":       sname,
                          "close":      today_close,
                          "pct":        today_pct,
                          "vol_ratio":  vol_ratio,
                          "base_open":  base_open,
                          "base_date":  base_date,
                          "days_since": days_since,
                      }
                  except:
                      return None

              with ThreadPoolExecutor(max_workers=30) as executor:
                  futures = {executor.submit(check_stock, s): s for s in scan_pool}
                  for future in as_completed(futures):
                      res = future.result()
                      if res:
                          qualified.append(res)

              log("高位整理", f"价格走势筛出{len(qualified)}只，开始查板块...")

              # ===== 第二步：对筛出的股票并发查板块 =====
              def fetch_sector(item):
                  etf_code, sector_label = get_stock_sector_etf(item["scode"])
                  item["etf_code"]     = etf_code
                  item["sector_label"] = sector_label
                  return item

              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = [executor.submit(fetch_sector, item) for item in qualified]
                  final = [f.result() for f in as_completed(futures)]

              # ===== 第三步：按板块ETF今日涨跌幅降序，板块内按个股涨幅降序 =====
              sector_groups = defaultdict(list)
              for s in final:
                  sector_groups[s["etf_code"]].append(s)

              sorted_sectors = sorted(
                  sector_groups.keys(),
                  key=lambda ec: etf_pct_map.get(ec, ("", -999))[1],
                  reverse=True
              )

              out = []
              if not final:
                  out = ["暂无符合条件的股票（10日内涨停，此后每日收盘>=涨停日开盘价）"]
              else:
                  out.append(f"共找到{len(final)}只，按板块ETF今日涨跌幅排列：")
                  for etf_code in sorted_sectors:
                      sector_name, etf_pct = etf_pct_map.get(etf_code, (etf_code, 0))
                      stocks = sector_groups[etf_code]
                      stocks.sort(key=lambda x: x["pct"], reverse=True)
                      etf_arrow = "▲" if etf_pct > 0 else ("▼" if etf_pct < 0 else "—")
                      # 显示申万行业标签（括号内）
                      sector_labels = list({s["sector_label"] for s in stocks})
                      label_str = "/".join(sector_labels[:2])
                      out.append(f"【{sector_name}  板块{etf_arrow}{abs(etf_pct):.2f}%  ({label_str})】")
                      for s in stocks:
                          arrow   = "▲" if s["pct"] > 0 else ("▼" if s["pct"] < 0 else "—")
                          vol_tag = f"  量比{s['vol_ratio']:.1f}x" if s["vol_ratio"] > 1.5 else ""
                          out.append(
                              f"  {s['name']}({s['scode']}): {s['close']:.2f}"
                              f"  {arrow}{abs(s['pct']):.2f}%{vol_tag}"
                              f"  [涨停:{s['base_date']} 基准开盘:{s['base_open']:.2f}"
                              f" {s['days_since']}天前]"
                          )

              log("高位整理", f"输出{len(final)}只，覆盖{len(sector_groups)}个板块")
              return out

          # ===== 8. 明日打板候选 =====
          def scan_board_candidates(etf_rows):
              """
              今日涨停(>=9.5%) + 热门板块(ETF涨>=1%) + 连板<=3 + 板块内>=2只涨停
              板块归属：先用akshare查，再映射到ETF
              """
              from concurrent.futures import ThreadPoolExecutor, as_completed

              scan_pool = build_stock_pool()

              etf_pct_map = {}
              for sector, code, last, pct, d in etf_rows:
                  if pct is not None:
                      etf_pct_map[code] = (sector, pct)
              hot_sectors = {code for code, (_, pct) in etf_pct_map.items() if pct >= 1.0}

              stock_names = {}
              try:
                  import akshare as _ak, pandas as _pd
                  _all = _pd.concat([_ak.stock_sh_a_spot_em(), _ak.stock_sz_a_spot_em()], ignore_index=True)
                  name_col = "名称" if "名称" in _all.columns else _all.columns[1]
                  code_col = "代码" if "代码" in _all.columns else _all.columns[0]
                  for _, row in _all.iterrows():
                      c = str(row[code_col]).zfill(6)
                      yf_c = c+".SS" if c.startswith(("6","5")) else c+".SZ"
                      stock_names[yf_c] = str(row[name_col])
              except:
                  pass

              candidates = []
              sector_limit_count = {}

              def check_board(scode):
                  try:
                      hist = yf.Ticker(scode).history(period="3mo").dropna(subset=["Close","Volume"])
                      if len(hist) < 60:
                          return None
                      closes = hist["Close"].values
                      vols   = hist["Volume"].values
                      n = len(closes)
                      today_pct = (closes[-1] - closes[-2]) / closes[-2] * 100
                      if today_pct < 9.5:
                          return None
                      # 连板数
                      consec = 1
                      for i in range(n-2, max(n-5,1)-1, -1):
                          if (closes[i]-closes[i-1])/closes[i-1]*100 >= 9.5:
                              consec += 1
                          else:
                              break
                      if consec > 3:
                          return None
                      avg_vol   = vols[max(n-7,0):n-1].mean()
                      vol_ratio = vols[-1]/avg_vol if avg_vol > 0 else 1
                      score     = vol_ratio * (4 - consec)
                      sname = stock_names.get(scode, scode)
                      return {"scode":scode,"name":sname,"close":closes[-1],
                              "consec":consec,"vol_ratio":vol_ratio,"score":score}
                  except:
                      return None

              with ThreadPoolExecutor(max_workers=30) as executor:
                  futures = {executor.submit(check_board, s): s for s in scan_pool}
                  raw = [f.result() for f in as_completed(futures) if f.result()]

              # 查板块，过滤非热门
              def fetch_sector_board(item):
                  etf_code, _ = get_stock_sector_etf(item["scode"])
                  item["etf_code"] = etf_code
                  return item

              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = [executor.submit(fetch_sector_board, item) for item in raw]
                  with_sector = [f.result() for f in as_completed(futures)]

              for item in with_sector:
                  ec = item["etf_code"]
                  sector_limit_count[ec] = sector_limit_count.get(ec, 0) + 1

              qualified = [c for c in with_sector
                           if c["etf_code"] in hot_sectors
                           and sector_limit_count.get(c["etf_code"],0) >= 2]
              qualified.sort(key=lambda x: x["score"], reverse=True)

              out = []
              if qualified:
                  out.append(f"共{len(qualified)}只候选 | ⚠️次日竞价高开>=2%再介入 | 跌破涨停价止损")
                  out.append("优先级：首板>2连板>3连板，量比越大越好，🔥=热门板块验证")
                  for c in qualified[:10]:
                      sector_name = etf_pct_map.get(c["etf_code"],(c["etf_code"],0))[0]
                      consec_tag  = "首板" if c["consec"]==1 else f"{c['consec']}连板"
                      hot = "🔥" if sector_limit_count.get(c["etf_code"],0)>=2 else "  "
                      out.append(
                          f"  {hot}{c['name']}({c['scode']}): {c['close']:.2f}"
                          f"  [{consec_tag}]  量比{c['vol_ratio']:.1f}x  [{sector_name}]"
                      )
              else:
                  out = ["今日暂无符合条件的打板候选"]

              log("打板候选", f"筛出{len(qualified)}只")
              return out

          # ===== 9. 财经新闻 =====
          def fetch_news():
              from email.utils import parsedate_to_datetime
              queries = [
                  ("A股/中国市场", "https://news.google.com/rss/search?q=A股+股市&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("科技/AI",      "https://news.google.com/rss/search?q=人工智能+科技股&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"),
                  ("宏观经济",     "https://news.google.com/rss/search?q=美联储+经济+利率&hl=en-US&gl=US&ceid=US:en"),
              ]
              all_news = []
              for category, url in queries:
                  try:
                      r = requests.get(url, timeout=8, headers={"User-Agent":"Mozilla/5.0"})
                      items = re.findall(
                          r"<item>.*?<title><!\[CDATA\[(.+?)\]\]></title>.*?<pubDate>(.+?)</pubDate>.*?</item>",
                          r.text, re.DOTALL)
                      if not items:
                          titles = re.findall(r"<title>(.+?)</title>", r.text)[1:5]
                          dates  = re.findall(r"<pubDate>(.+?)</pubDate>", r.text)[:4]
                          items  = list(zip(titles, dates + [""]*4))
                      headlines = []
                      for title, pub in items[:4]:
                          title = title.strip()
                          if not title or "Google" in title:
                              continue
                          try:
                              dt = parsedate_to_datetime(pub.strip())
                              import datetime as _dt
                              bj_hour  = (dt.hour + 8) % 24
                              time_str = f"{dt.month:02d}/{dt.day:02d} {bj_hour:02d}:{dt.minute:02d}"
                          except:
                              time_str = ""
                          tag = f"[{time_str}] " if time_str else ""
                          headlines.append(f"  • {tag}{title}")
                      if headlines:
                          all_news.append(f"【{category}】")
                          all_news.extend(headlines)
                  except Exception as e:
                      all_news.append(f"【{category}】获取失败: {e}")
              log("新闻", f"获取{len([n for n in all_news if '•' in n])}条")
              return all_news if all_news else ["新闻获取失败"]

          # ===== 10. 宏观日历 =====
          def macro_calendar():
              now = datetime.datetime.utcnow()
              events = [
                  (datetime.date(2026, 3, 10), "🇺🇸 美国CPI数据公布"),
                  (datetime.date(2026, 3, 17), "🇺🇸 美国零售销售数据"),
                  (datetime.date(2026, 3, 18), "🇺🇸 美联储FOMC利率决议"),
                  (datetime.date(2026, 3, 19), "🇺🇸 美联储新闻发布会"),
                  (datetime.date(2026, 3, 20), "🇯🇵 日本央行利率决议"),
                  (datetime.date(2026, 4, 1),  "🇨🇳 中国PMI数据公布"),
                  (datetime.date(2026, 4, 3),  "🇺🇸 美国非农就业数据"),
                  (datetime.date(2026, 4, 10), "🇺🇸 美国CPI数据公布"),
                  (datetime.date(2026, 4, 29), "🇺🇸 美联储FOMC利率决议"),
                  (datetime.date(2026, 5, 1),  "🇺🇸 美国非农就业数据"),
                  (datetime.date(2026, 5, 8),  "🇨🇳 中国外贸数据"),
                  (datetime.date(2026, 6, 10), "🇺🇸 美联储FOMC利率决议"),
              ]
              today = now.date()
              result = []
              for event_date, event_name in events:
                  delta = (event_date - today).days
                  if delta < 0:
                      continue
                  elif delta == 0:
                      result.append(f"🔴 今日：{event_name}")
                  elif delta == 1:
                      result.append(f"🟠 明日：{event_name}")
                  elif delta <= 7:
                      result.append(f"🟡 {delta}天后({event_date.strftime('%m/%d')})：{event_name}")
                  elif delta <= 14:
                      result.append(f"⚪ {delta}天后({event_date.strftime('%m/%d')})：{event_name}")
              if not result:
                  result = ["未来两周内无重大宏观事件"]
              log("宏观日历", f"找到{len(result)}个事件")
              return result[:6]

          # ===== 11. AI报告 =====
          def ai_report(data_text):
              api_key = os.environ["GEMINI_API_KEY"]
              try:
                  r0 = requests.get(
                      f"https://generativelanguage.googleapis.com/v1beta/models?key={api_key}",
                      timeout=10)
                  models = r0.json().get("models", [])
                  usable = [m["name"].split("/")[1] for m in models
                            if "generateContent" in m.get("supportedGenerationMethods",[])
                            and "flash" in m["name"]]
                  model_name = usable[0] if usable else "gemini-2.0-flash"
                  log("Gemini", f"使用模型: {model_name}")
              except Exception as e:
                  model_name = "gemini-2.0-flash"
                  log("Gemini", f"模型查询失败: {e}")
              url = (f"https://generativelanguage.googleapis.com/v1beta/models/"
                     f"{model_name}:generateContent?key={api_key}")
              system_instruction = (
                  "你是资深券商策略首席分析师。"
                  "报告必须100%基于提供的真实数据和具体数值。"
                  "若数据标注失败或暂无则跳过，禁止任何模板化描述。"
              )
              prompt = f"""以下是今日完整市场数据，请生成专业投资策略报告：

          {data_text}

          报告结构（每节必须引用上方具体数字和股票名称）：

          【一、全球市场与宏观风险】
          结合美股科技股涨跌数据和宏观日历事件，分析当前全球市场情绪和近期宏观风险点。

          【二、A股板块轮动分析】
          重点分析涨幅前5和跌幅前5的板块，说明资金流向逻辑，引用具体板块名称和涨跌幅数值。

          【三、强势标的精选】
          结合强势股和中盘股筛选结果，点评量比较大或涨幅突出的个股，说明其所在板块逻辑和关注理由。

          【四、打板与整理机会】
          结合涨停高位整理和明日打板候选数据，分析短线机会，说明入场逻辑和止损位。

          【五、新闻驱动分析】
          结合今日财经新闻，分析哪些新闻可能对明日A股产生影响，指出受益或受损的板块。

          【六、风险提示】
          结合宏观事件日历和跌幅较大板块，提示近期需要规避的方向和时间节点。

          【七、明日操作策略】
          给出明日重点关注的板块和个股候选，说明进场逻辑，必须有数据支撑，约1000字总计。"""
              payload = {
                  "system_instruction": {"parts": [{"text": system_instruction}]},
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 8192}
              }
              for attempt in range(3):
                  r = requests.post(url, json=payload, timeout=60)
                  if r.status_code == 429:
                      wait = 30 * (attempt + 1)
                      log("Gemini", f"429限速，等待{wait}秒重试")
                      time.sleep(wait)
                      continue
                  r.raise_for_status()
                  text = r.json()["candidates"][0]["content"]["parts"][0]["text"]
                  log("Gemini", "报告生成成功")
                  return text
              raise Exception("Gemini重试3次失败")

          # ===== HTML邮件 =====
          def to_html(data_text, report):
              rows = ""
              for line in data_text.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("====="):
                      section = line.replace("=","").strip()
                      rows += (f"<h3 style='color:#c0392b;margin:16px 0 6px;font-size:15px;"
                               f"border-left:3px solid #c0392b;padding-left:8px;'>{section}</h3>")
                  elif line.startswith("【") and line.endswith("】"):
                      rows += (f"<p style='margin:8px 0 2px;font-size:13px;font-weight:bold;"
                               f"color:#555;'>{line}</p>")
                  else:
                      has_up = "▲" in line
                      has_dn = "▼" in line
                      color = "#c0392b" if has_up else ("#27ae60" if has_dn else "#333")
                      rows += (f"<p style='margin:2px 0;font-size:13px;color:{color};"
                               f"font-family:monospace;'>{line}</p>")
              rhtml = report.replace("\n\n","</p><p style='margin:10px 0;'>").replace("\n","<br>")
              rhtml = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", rhtml)
              rhtml = f"<p style='margin:10px 0;'>{rhtml}</p>"
              return (
                  "<!DOCTYPE html><html><head>"
                  "<meta charset='utf-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1.0'>"
                  "</head>"
                  "<body style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;"
                  "max-width:640px;margin:0 auto;padding:16px;background:#f0f2f5;'>"
                  "<div style='background:#fff;border-radius:12px;padding:20px;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<h1 style='font-size:20px;color:#1a1a1a;border-bottom:3px solid #c0392b;"
                  "padding-bottom:10px;margin-top:0;'>📊 AI量化投资日报stockselection</h1>"
                  "<div style='background:#fafafa;border-radius:8px;padding:14px;margin-bottom:16px;'>"
                  f"{rows}"
                  "</div>"
                  "<h2 style='font-size:17px;color:#c0392b;margin-bottom:12px;'>📝 AI策略报告</h2>"
                  "<div style='line-height:1.8;color:#222;font-size:15px;'>"
                  f"{rhtml}"
                  "</div>"
                  "<div style='font-size:12px;color:#999;border-top:1px solid #eee;"
                  "margin-top:20px;padding-top:10px;'>"
                  "本报告由AI基于实时数据自动生成，不构成投资建议。</div>"
                  "</div></body></html>"
              )

          def send_mail(subject, data_text, report):
              sender   = os.environ["EMAIL_USER"]
              password = os.environ["EMAIL_PASS"]
              msg = MIMEMultipart("alternative")
              msg["Subject"] = subject
              msg["From"]    = sender
              msg["To"]      = sender
              msg.attach(MIMEText(f"{data_text}\n\n{report}", "plain", "utf-8"))
              msg.attach(MIMEText(to_html(data_text, report), "html", "utf-8"))
              with smtplib.SMTP_SSL("smtp.qq.com", 465) as s:
                  s.login(sender, password)
                  s.sendmail(sender, sender, msg.as_string())
              log("邮件", "发送成功")

