name: A股涨停扫描

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'   # 北京时间17:00

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Run scanner
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'

          import akshare as ak
          import datetime,os,smtplib
          from email.mime.text import MIMEText

          print("获取A股列表...")

          df = ak.stock_info_a_code_name()

          stocks = []

          for _,row in df.iterrows():

              code = str(row["code"]).zfill(6)
              name = row["name"]

              if "ST" in name or "st" in name:
                  continue

              stocks.append((code,name))

          print("股票数量:",len(stocks))


          def is_limit_up(code):

              try:

                  hist = ak.stock_zh_a_hist(
                      symbol=code,
                      period="daily",
                      adjust=""
                  )

                  if len(hist) < 60:
                      return None

                  close = hist["收盘"].values
                  pct = (close[-1]-close[-2]) / close[-2] * 100

                  if pct >= 9.8:
                      return pct

              except:
                  return None


          print("开始扫描...")

          results = []

          for code,name in stocks:

              pct = is_limit_up(code)

              if pct:
                  results.append(f"{code} {name} {pct:.2f}%")

          print("涨停数量:",len(results))


          now = datetime.datetime.now().strftime("%Y-%m-%d")

          text = "A股今日涨停股票 "+now+"\n\n"

          if len(results)==0:

              text += "没有检测到涨停股票"

          else:

              for r in results:
                  text += r+"\n"


          print(text)


          sender = os.environ["EMAIL_USER"]
          password = os.environ["EMAIL_PASS"]

          msg = MIMEText(text,"plain","utf-8")

          msg["Subject"] = "A股涨停扫描 "+now
          msg["From"] = sender
          msg["To"] = sender

          server = smtplib.SMTP_SSL("smtp.qq.com",465)

          server.login(sender,password)

          server.sendmail(sender,sender,msg.as_string())

          server.quit()

          print("邮件发送成功")

          PYEOF
