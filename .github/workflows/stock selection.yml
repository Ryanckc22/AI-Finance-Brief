              ]
              rows = []
              for sector, code in etfs:
                  try:
                      hist = yf.Ticker(code).history(period="5d").dropna(subset=["Close"])
                      if len(hist) < 2:
                          rows.append((sector, code, None, None, None))
                          continue
                      prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                      d = hist.index[-1].strftime("%m-%d")
                      pct = (last - prev) / prev * 100
                      rows.append((sector, code, last, pct, d))
                  except:
                      rows.append((sector, code, None, None, None))
              rows.sort(key=lambda x: x[3] if x[3] is not None else -999, reverse=True)
              result = []
              for i,(sector,code,last,pct,d) in enumerate(rows,1):
                  if last is None:
                      result.append(f"{i:2}. {sector}({code}): 暂无数据")
                  else:
