import yfinance as yf

# 随便找一只你知道最近10天内有涨停的股票测试
scode = "600979.SS"  # 广安爱众
hist = yf.Ticker(scode).history(period="3mo").dropna(subset=["Close","Open"])
hist = hist.tail(15)

closes = hist["Close"].values
opens  = hist["Open"].values
dates  = hist.index
n = len(closes)

print(f"n={n}")
for i in range(1, n):
    pct = (closes[i]-closes[i-1])/closes[i-1]*100
    print(f"[{i}] {dates[i].strftime('%m/%d')}  开:{opens[i]:.2f}  收:{closes[i]:.2f}  涨:{pct:+.2f}%")

print(f"\nsearch_start={max(n-11,1)}, search_end={n-1}")
print(f"搜索范围: index {max(n-11,1)} 到 {n-2}")
