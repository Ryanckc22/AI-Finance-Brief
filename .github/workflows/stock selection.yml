name: A股涨停扫描测试

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance

      - name: Run scanner
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'

          import yfinance as yf
          import akshare as ak
          import datetime,os,smtplib
          from email.mime.text import MIMEText
          from concurrent.futures import ThreadPoolExecutor,as_completed

          print("生成股票池...")

          pool=[]

          # 上交所
          for i in range(600000,604000):
              pool.append(f"{i}.SS")

          # 深交所
          for i in range(1,4000):
              pool.append(f"{i:06d}.SZ")

          # 创业板
          for i in range(300000,302000):
              pool.append(f"{i}.SZ")

          # 科创板
          for i in range(688000,689000):
              pool.append(f"{i}.SS")

          print("候选股票数量:",len(pool))


          print("获取ST名单...")

          st_set=set()

          try:

              df=ak.stock_info_a_code_name()

              for _,row in df.iterrows():

                  if "ST" in row["name"] or "st" in row["name"]:

                      code=str(row["code"]).zfill(6)

                      st_set.add(code+".SS")
                      st_set.add(code+".SZ")

              print("ST数量:",len(st_set))

          except:

              print("ST获取失败，跳过ST过滤")


          def check_stock(code):

              try:

                  if code in st_set:
                      return None

                  hist=yf.Ticker(code).history(period="3mo")

                  if len(hist)<60:
                      return None

                  close=hist["Close"].values

                  pct=(close[-1]-close[-2])/close[-2]*100

                  if pct>=9.8:

                      return f"{code} {pct:.2f}%"

              except:
                  return None


          print("开始扫描...")

          results=[]

          with ThreadPoolExecutor(max_workers=30) as exe:

              futures=[exe.submit(check_stock,s) for s in pool]

              for f in as_completed(futures):

                  r=f.result()

                  if r:
                      results.append(r)


          print("涨停股票:",len(results))


          now=datetime.datetime.now().strftime("%Y-%m-%d")

          text="A股今日涨停股票 "+now+"\n\n"

          if len(results)==0:

              text+="没有检测到涨停股票"

          else:

              for r in results:
                  text+=r+"\n"


          print(text)


          sender=os.environ["EMAIL_USER"]
          password=os.environ["EMAIL_PASS"]

          msg=MIMEText(text,"plain","utf-8")

          msg["Subject"]="A股涨停扫描 "+now
          msg["From"]=sender
          msg["To"]=sender

          server=smtplib.SMTP_SSL("smtp.qq.com",465)

          server.login(sender,password)

          server.sendmail(sender,sender,msg.as_string())

          server.quit()

          print("邮件发送成功")

          PYEOF
