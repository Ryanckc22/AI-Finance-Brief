name: AI Finance Daily stock selection

on:
  schedule:
    - cron: '30 0,4,14 * * *'   # 北京时间 08:30 / 12:30 / 22:30
  workflow_dispatch:

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests yfinance akshare
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python - << 'PYEOF'
          import requests, datetime, smtplib, re, os, time
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import yfinance as yf

          def log(tag, msg):
              print(f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {tag}: {msg}")

          # ===== 1. 美股科技股 =====
          def us_tech_stocks():
              symbols = {
                  "NVDA":"英伟达","MSFT":"微软","TSLA":"特斯拉",
                  "AAPL":"苹果","META":"Meta","GOOGL":"谷歌",
                  "AMZN":"亚马逊","AMD":"超微半导体"
              }
              result = []
              for i,(s,name) in enumerate(symbols.items(),1):
                  try:
                      hist = yf.Ticker(s).history(period="5d").dropna(subset=["Close"])
                      if len(hist) < 2:
                          result.append(f"{i}. {name}({s}): 无数据")
                          continue
                      prev, last = hist["Close"].iloc[-2], hist["Close"].iloc[-1]
                      d = hist.index[-1].strftime("%m-%d")
                      chg = last - prev
                      result.append(f"{i}. {name}({s})[{d}]: ${last:.2f} {chg:+.2f}({chg/prev*100:+.2f}%)")
                  except Exception as e:
                      result.append(f"{i}. {name}({s}) 失败: {e}")
              log("美股", f"获取{len([r for r in result if '失败' not in r])}条")
              return result

