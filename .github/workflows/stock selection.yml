name: A股涨停扫描测试

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance pandas

      - name: Run scanner
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python - << 'PYEOF'

          import akshare as ak
          import yfinance as yf
          import datetime,os,smtplib
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from email.mime.text import MIMEText

          print("获取A股列表...")

          df=ak.stock_info_a_code_name()

          stocks=[]

          for _,row in df.iterrows():

              code=str(row["code"]).zfill(6)
              name=row["name"]

              # 过滤ST
              if "ST" in name or "st" in name:
                  continue

              if code.startswith("6"):
                  ticker=code+".SS"
              else:
                  ticker=code+".SZ"

              stocks.append((ticker,name))

          print("股票数量:",len(stocks))


          def check_stock(item):

              ticker,name=item

              try:

                  hist=yf.Ticker(ticker).history(period="5d")

                  if len(hist)<2:
                      return None

                  # 次新股过滤
                  if len(hist)<60:
                      return None

                  close=hist["Close"].values

                  pct=(close[-1]-close[-2])/close[-2]*100

                  # 主板涨停近似判断
                  if pct>=9.8:
                      return ticker+" "+name+" "+str(round(pct,2))+"%"

              except:
                  return None


          print("开始扫描...")

          results=[]

          with ThreadPoolExecutor(max_workers=30) as exe:

              futures=[exe.submit(check_stock,s) for s in stocks]

              for f in as_completed(futures):

                  r=f.result()

                  if r:
                      results.append(r)


          print("涨停股票:",len(results))


          now=datetime.datetime.now().strftime("%Y-%m-%d")

          text="A股今日涨停股票 "+now+"\n\n"

          if len(results)==0:
              text+="没有检测到涨停股票"
          else:
              for r in results:
                  text+=r+"\n"

          print(text)


          sender=os.environ["EMAIL_USER"]
          password=os.environ["EMAIL_PASS"]

          msg=MIMEText(text,"plain","utf-8")

          msg["Subject"]="A股涨停扫描 "+now
          msg["From"]=sender
          msg["To"]=sender

          server=smtplib.SMTP_SSL("smtp.qq.com",465)

          server.login(sender,password)

          server.sendmail(sender,sender,msg.as_string())

          server.quit()

          print("邮件发送成功")

          PYEOF
