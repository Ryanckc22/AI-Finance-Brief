                          vol_tag = f" 量比{vol_ratio:.1f}x" if vol_ratio >= 1.0 else ""
                          result.append(f"  {name}({scode}): {last:.2f}  {arrow}{abs(pct):.2f}%{vol_tag}")
              log("中盘强势股", "筛选完成")
              return (result if result else ["中盘强势股暂无数据"]), midcap_stocks

          # ===== 5. 全A股股票池（去ST，去次新）=====
          def build_stock_pool():
              """
              用 akshare 获取全A股列表（去ST）
              次新股过滤放到 check_stock 里用实际历史数据长度判断
              """
              def to_yf(code):
                  code = str(code).strip().zfill(6)
                  return code + '.SS' if code.startswith(('6','5')) else code + '.SZ'

              pool = set()
              import akshare as ak

              # 方法1：上交所+深交所实时行情（最全，包含所有A股）
              try:
                  import pandas as pd
                  sh = ak.stock_sh_a_spot_em()
                  sz = ak.stock_sz_a_spot_em()
                  all_stocks = pd.concat([sh, sz], ignore_index=True)
                  # 过滤ST
                  name_col = "名称" if "名称" in all_stocks.columns else all_stocks.columns[1]
                  code_col = "代码" if "代码" in all_stocks.columns else all_stocks.columns[0]
                  all_stocks = all_stocks[~all_stocks[name_col].str.contains("ST|st", na=False)]
                  for c in all_stocks[code_col].tolist():
                      yf_code = to_yf(str(c))
                      pool.add(yf_code)
                  log("股票池", f"上交所+深交所实时行情获取{len(pool)}只")
              except Exception as e:
                  log("股票池", f"实时行情接口失败: {e}，降级用stock_info_a_code_name")
                  # 方法2：降级用基础列表
                  try:
                      df = ak.stock_info_a_code_name()
                      df = df[~df["name"].str.contains("ST|st", na=False)]
                      for c in df["code"].tolist():
                          yf_code = to_yf(str(c))
                          pool.add(yf_code)
                      log("股票池", f"基础列表获取{len(pool)}只")
                  except Exception as e2:
                      log("股票池", f"基础列表也失败: {e2}，降级用三大指数")
                      # 方法3：再降级用三大指数
                      for symbol, name in [("000300","沪深300"),("000905","中证500"),("000852","中证1000")]:
                          try:
                              df = ak.index_stock_cons_weight_csindex(symbol=symbol)
                              col = "成分券代码" if "成分券代码" in df.columns else df.columns[0]
                              before = len(pool)
                              for c in df[col].tolist():
                                  yf_code = to_yf(str(c))
                                  pool.add(yf_code)
                              log("股票池", f"{name}: +{len(pool)-before}只")
                          except Exception as e3:
                              log("股票池", f"{name}失败: {e3}")

              result = list(pool)
              log("股票池", f"最终股票池{len(result)}只")
              return result

          # ===== 6. 板块匹配：用akshare查单股所属申万行业，映射到ETF =====
          # 申万一级行业 -> ETF代码 映射表
          SW_TO_ETF = {
