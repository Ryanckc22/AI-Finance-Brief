                  ("计算机",        "512720.SS"),
                  ("5G/通信",       "515050.SS"),
                  ("卫星/航天",     "516160.SS"),
                  ("有色金属",      "512400.SS"),
                  ("油气/石油",     "159697.SZ"),
                  ("化工",          "516020.SS"),
                  ("钢铁",          "515210.SS"),
                  ("煤炭",          "515220.SS"),
